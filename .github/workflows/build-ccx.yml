# Builds the distributable .ccx package using Adobe's official UXP tooling.
#
# IMPORTANT: a .ccx is NOT just a renamed zip. A plain "zip -r ... .ccx"
# produces an archive that the Unified Plugin Installer Agent (UPIA) rejects
# (errors like -267 / -4), even though the same files load fine as an
# unpacked folder in the UXP Developer Tool. Only a package produced by the
# official tooling (UDT "Package" action, or `uxp plugin package` from
# @adobe/uxp-devtools-cli) is installable. This workflow uses the CLI so the
# build is reproducible and host-independent (no running InDesign required).
#
# Triggers:
#   - every push of a tag "v*" (e.g. v1.0.1): builds AND attaches the .ccx
#     to a GitHub Release for that tag
#   - manual run (workflow_dispatch): builds and uploads the .ccx as a
#     workflow artifact
name: Build CCX

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # needed to create the release on tag builds

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Read plugin version from manifest
        id: ver
        run: echo "version=$(jq -r .version manifest.json)" >> "$GITHUB_OUTPUT"

      - name: Install UXP devtools CLI
        run: npm install -g @adobe/uxp-devtools-cli

      - name: Show package command help (reveals exact flags if they change)
        run: uxp plugin package --help || true

      - name: Build .ccx with the official UXP packager
        run: |
          mkdir -p dist
          uxp plugin package \
            --manifest manifest.json \
            --outputPath dist
          ls -l dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: szh-a11y-indesign-plugin_${{ steps.ver.outputs.version }}
          path: dist/*.ccx

      - name: Attach to GitHub Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.ccx
          generate_release_notes: true
